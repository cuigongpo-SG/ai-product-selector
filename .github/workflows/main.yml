name: AI Selection Auto-Run

on:
  schedule:
    - cron: '0 1,13 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: '品类'
        required: true
        default: 'Home'
      keywords:
        description: '关键词'
        required: false
        default: ''

# 新增：允许脚本修改仓库内容（为了发布网页报告）
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt playwright requests

      - name: Run Pipeline
        env:
          TARGET_CATEGORY: ${{ github.event.inputs.category }}
          TARGET_KEYWORDS: ${{ github.event.inputs.keywords }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python harvester.py
          python analyst.py
          python renderer.py
          python notifier.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ # 部署当前目录下的 index.html
