name: AI Selection Auto-Run

on:
  schedule:
    - cron: '0 1,13 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: '想要采集的产品品类 (例如: Kitchen, Pet, 3C)'
        required: true
        default: 'Home'
      keywords:
        description: '关键词过滤 (例如: Portable, Wireless)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Harvester
        env:
          TARGET_CATEGORY: ${{ github.event.inputs.category }}
          TARGET_KEYWORDS: ${{ github.event.inputs.keywords }}
        run: python harvester.py

      - name: Run Analyst (Gemini AI)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python analyst.py  # 这一步会调用你刚才创建的分析脚本

      - name: Upload Reports
        uses: actions/upload-artifact@v4 # 核心修复点：改用 v4 版本
        with:
          name: selection-reports
          path: |
            raw_data.json
            analysis_report.json
