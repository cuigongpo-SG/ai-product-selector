name: AI Selection Auto-Run

on:
  workflow_dispatch:
    inputs:
      category:
        description: '品类'
        required: true
        default: 'Home'
      keywords:
        description: '关键词'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装必要工具
        run: pip install -r requirements.txt requests

      - name: 运行自动化流水线
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          TARGET_CATEGORY: ${{ github.event.inputs.category }}
          TARGET_KEYWORDS: ${{ github.event.inputs.keywords }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 即使其中一个失败，也要继续跑完，确保你能收到 Telegram 报错提醒
          python harvester.py || echo "采集阶段跳过"
          python analyst.py || echo "AI分析阶段跳过"
          python renderer.py || echo "网页渲染阶段跳过"
          python notifier.py || echo "发送通知"

      - name: 自动部署网页版报告
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ 
          publish_branch: gh-pages
