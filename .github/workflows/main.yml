name: AI Selection Auto-Run

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Amazon US Category (e.g., kitchen, electronics)'
        required: true
        default: 'kitchen'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 部署 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 3. 安装依赖与浏览器内核
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: 4. 执行自动化流水线
        env:
          TARGET_CATEGORY: ${{ github.event.inputs.category }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python harvester.py   # 采集北美数据
          python analyst.py     # Gemini 2.5 分析
          python renderer.py    # 渲染 HTML 报告
          python notifier.py    # 发送 Telegram 通知

      - name: 5. 部署报告至 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
